name: My Cash Supervisor
version: "0.1.6"
slug: fintrack
description: Einnahmen-/Ausgaben-Überwachung mit CSV-Import
url: "https://github.com/borstel4711/my-cash-supervisor"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
# s6-overlay v3 (Base-Image) muss selbst PID 1 sein. Ohne init: false
# injiziert der Supervisor Dockers eigenes Init als PID 1 und s6 bricht mit
# "s6-overlay-suexec: fatal: can only run as pid 1" ab.
init: false
ingress: true
# 0 lässt den Supervisor einen freien internen Port zuteilen, statt fix auf
# 8099 zu bestehen (der z.B. von einem anderen Add-on belegt sein kann). Das
# Run-Skript liest den tatsächlich zugewiesenen Port über
# bashio::addon.ingress_port aus.
ingress_port: 0
panel_icon: mdi:cash-multiple
panel_title: My Cash Supervisor
map:
  - data:rw
